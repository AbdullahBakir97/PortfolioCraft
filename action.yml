name: 'PortfolioCraft Action'
description: 'Generate a verifiable professional portfolio from your GitHub history.'
author: 'Abdullah Bakir'
branding:
  icon: 'user'
  color: 'blue'

inputs:
  token:
    description: 'GitHub token used for API requests. `secrets.GITHUB_TOKEN` is enough for public-repo data; use a PAT for private signal.'
    required: true
  user:
    description: 'GitHub login to profile. Defaults to the token owner.'
    required: false
    default: ''
  sections:
    description: 'Comma-separated README sections to generate. Order is preserved.'
    required: false
    default: 'header,stack,projects,activity'
  locale:
    description: 'Locale for templates (en, ar).'
    required: false
    default: 'en'
  output-readme:
    description: 'Path to the README to update between markers. Set to empty string to skip.'
    required: false
    default: 'README.md'
  output-json:
    description: 'Path to write JSON Resume (schemaVersion 1.0.0). Set to empty string to skip.'
    required: false
    default: 'profile.json'
  output-pdf:
    description: 'Path to write the PDF CV. Set to empty string to skip.'
    required: false
    default: 'cv.pdf'
  output-svg-dir:
    description: 'Directory to write SVG stat cards. Set to empty string to skip.'
    required: false
    default: 'assets/cards'
  config-file:
    description: 'Optional YAML config file to override defaults.'
    required: false
    default: '.portfoliocraft.yml'
  commit:
    description: 'Whether to commit generated artifacts back to the repository.'
    required: false
    default: 'true'
  commit-message:
    description: 'Commit message used when committing artifacts.'
    required: false
    default: 'chore: refresh portfolio'
  dry-run:
    description: 'Run end-to-end without writing files or committing. Useful for previewing.'
    required: false
    default: 'false'
  explain:
    description: 'Print the scoring/classification reasoning to the job log.'
    required: false
    default: 'false'
  mode:
    description: "What to run: portfolio | audit | both | summary | all. Default 'portfolio' is backward-compatible with v0.1."
    required: false
    default: 'portfolio'
  audit-output-md:
    description: 'Path to write the audit Markdown report. Empty string to skip.'
    required: false
    default: 'audit.md'
  audit-output-json:
    description: 'Path to write the audit JSON report. Empty string to skip.'
    required: false
    default: 'audit.json'
  audit-fail-on:
    description: 'Severity threshold that fails the run. Empty disables. Values: low | medium | high | critical.'
    required: false
    default: ''
  audit-check-run:
    description: 'Post a GitHub Checks API summary for the audit run. Requires permissions: checks: write on the calling workflow.'
    required: false
    default: 'true'
  summary-format:
    description: 'What to render in summary phase: cv | uni | case-studies | all.'
    required: false
    default: 'all'
  summary-output-cv:
    description: 'Path to write the CV-shaped Markdown summary. Empty string to skip.'
    required: false
    default: 'summary-cv.md'
  summary-output-uni:
    description: 'Path to write the university-application Markdown summary. Empty string to skip.'
    required: false
    default: 'summary-uni.md'
  summary-output-case-studies:
    description: 'Path to write the project case-studies Markdown. Empty string to skip.'
    required: false
    default: 'summary-case-studies.md'
  summary-projects-max:
    description: 'Max number of projects included in CV / case-studies. 1-20.'
    required: false
    default: '6'

outputs:
  readme-updated:
    description: 'true if the README was changed by this run.'
  json-path:
    description: 'Path of the generated JSON Resume file.'
  pdf-path:
    description: 'Path of the generated PDF CV.'
  cards-dir:
    description: 'Directory containing generated SVG cards.'
  summary:
    description: 'One-line summary of the generated portfolio.'
  audit-md-path:
    description: 'Path of the generated audit Markdown file.'
  audit-json-path:
    description: 'Path of the generated audit JSON file.'
  audit-finding-count:
    description: 'Total number of audit findings.'
  audit-fail-on-result:
    description: 'pass / fail / not-evaluated based on audit-fail-on.'
  summary-cv-path:
    description: 'Path of the generated CV Markdown summary, or empty string when not rendered.'
  summary-uni-path:
    description: 'Path of the generated university Markdown summary, or empty string when not rendered.'
  summary-case-studies-path:
    description: 'Path of the generated case-studies Markdown summary, or empty string when not rendered.'
  commit-sha:
    description: 'SHA of the commit pushed back to the repo when commit=true. Empty string when no commit was made.'
  commit-skipped-reason:
    description: 'Empty when a commit was made; otherwise one of: commit-disabled | dry-run | fork-pr | no-changes | no-paths.'

runs:
  using: 'node20'
  main: 'dist/index.js'
