name: Dogfood

on:
  push:
    branches: [main]
    paths:
      - 'dist/**'
      - 'action.yml'
      - 'examples/abdullahbakir97/**'
  workflow_dispatch:
  schedule:
    - cron: '17 4 * * *'   # daily

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run PortfolioCraft against AbdullahBakir97 (portfolio + audit + summary)
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: AbdullahBakir97
          mode: all
          config-file: examples/abdullahbakir97/.portfoliocraft.yml
          output-readme: ''
          output-json: examples/abdullahbakir97/profile.json
          output-pdf: examples/abdullahbakir97/cv.pdf
          output-svg-dir: examples/abdullahbakir97/cards
          audit-output-md: examples/abdullahbakir97/audit.md
          audit-output-json: examples/abdullahbakir97/audit.json
          audit-fail-on: ''
          summary-format: all
          summary-output-cv: examples/abdullahbakir97/summary-cv.md
          summary-output-uni: examples/abdullahbakir97/summary-uni.md
          summary-output-case-studies: examples/abdullahbakir97/summary-case-studies.md
          commit: false
          dry-run: false
          explain: true

      - name: Upload generated artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: portfolio-abdullahbakir97
          path: |
            examples/abdullahbakir97/profile.json
            examples/abdullahbakir97/cv.pdf
            examples/abdullahbakir97/cards/*.svg
            examples/abdullahbakir97/audit.md
            examples/abdullahbakir97/audit.json
            examples/abdullahbakir97/summary-cv.md
            examples/abdullahbakir97/summary-uni.md
            examples/abdullahbakir97/summary-case-studies.md
          if-no-files-found: warn
          retention-days: 14
