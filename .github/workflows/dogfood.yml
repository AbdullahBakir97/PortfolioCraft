name: Dogfood

on:
  push:
    branches: [main]
    paths:
      - 'dist/**'
      - 'action.yml'
      - 'examples/abdullahbakir97/**'
  workflow_dispatch:
  schedule:
    - cron: '17 4 * * *'   # daily

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run PortfolioCraft against AbdullahBakir97 (dry-run)
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: AbdullahBakir97
          config-file: examples/abdullahbakir97/.portfoliocraft.yml
          output-readme: ''
          output-json: examples/abdullahbakir97/profile.json
          output-pdf: examples/abdullahbakir97/cv.pdf
          output-svg-dir: examples/abdullahbakir97/cards
          commit: false
          dry-run: false
          explain: true

      - name: Upload generated artifacts
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: portfolio-abdullahbakir97
          path: |
            examples/abdullahbakir97/profile.json
            examples/abdullahbakir97/cv.pdf
            examples/abdullahbakir97/cards/*.svg
          if-no-files-found: warn
          retention-days: 14
