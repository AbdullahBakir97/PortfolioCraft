name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup pnpm
        # version is read from packageManager in package.json
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build & bundle
        run: |
          pnpm build
          pnpm bundle

      - name: Run release-please
        id: rp
        uses: googleapis/release-please-action@7987652d64b4581673a76e33ad5e98e3dd56832f # v4.1.3
        with:
          release-type: node
          target-branch: main

      - name: Update floating v1 tag
        if: ${{ steps.rp.outputs.release_created == 'true' }}
        run: |
          tag="${{ steps.rp.outputs.tag_name }}"
          major="$(echo "$tag" | sed -E 's/^v?([0-9]+).*/v\1/')"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -fa "$major" -m "$major → $tag"
          git push origin "$major" --force

      - name: Generate SBOM (CycloneDX)
        if: ${{ steps.rp.outputs.release_created == 'true' }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-release-assets: true

      - name: Attest build provenance
        if: ${{ steps.rp.outputs.release_created == 'true' }}
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1.4.4
        with:
          subject-path: 'dist/index.js'
